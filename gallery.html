```html
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>फोटो गैलरी | श्री कृष्ण जन्माष्टमी पूजा समिति</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#081b3a,#123f85);
}

.header{
background:linear-gradient(90deg,#ff7b00,#ffb300);
padding:25px;
text-align:center;
color:white;
}

.header h1{
font-size:32px;
}

.gallery{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:15px;
cursor:pointer;
border:4px solid white;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:9999;
}

.popup img{
max-width:95%;
max-height:95%;
border-radius:15px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:40px;
color:white;
cursor:pointer;
}

.footer{
background:#111827;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<div class="header">
<h1>📸 फोटो गैलरी</h1>
<p>श्री कृष्ण जन्माष्टमी पूजा समिति, भदीड़</p>
</div>

<div class="gallery">

<img src="logo.png" onclick="openImage(this.src)">
<img src="photo1.jpeg" onclick="openImage(this.src)">
<img src="photo2.jpeg" onclick="openImage(this.src)">
<img src="photo3.jpeg" onclick="openImage(this.src)">
<img src="photo4.jpeg" onclick="openImage(this.src)">
<img src="photo6.jpeg" onclick="openImage(this.src)">

</div>

<div class="popup" id="popup">

<span class="close" onclick="closeImage()">&times;</span>

<img id="popup-img">

</div>

<div class="footer">

🌺 श्री कृष्ण जन्माष्टमी पूजा समिति, भादीड़ 🌺

</div>

<script>

function openImage(src){
document.getElementById("popup").style.display="flex";
document.getElementById("popup-img").src=src;
}

function closeImage(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
```
